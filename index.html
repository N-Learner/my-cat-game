<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>猫咪叠叠乐：物理灾难秀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0614;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#fff;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.hud-tl{position:absolute;top:12px;left:12px}
.hud-tr{position:absolute;top:12px;right:52px;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.hud-score{font-size:clamp(18px,4vw,28px);font-weight:800;color:#e0ffff;text-shadow:0 0 10px rgba(224,255,255,0.8),0 0 20px rgba(150,200,255,0.5)}
.hud-height{font-size:clamp(12px,2.5vw,16px);opacity:.9;margin-top:2px;color:#e0ffff;text-shadow:0 0 8px rgba(224,255,255,0.6)}
.hud-hi{font-size:clamp(10px,2vw,13px);opacity:.7;margin-top:2px;color:#b8e0ff;text-shadow:0 0 6px rgba(180,220,255,0.5)}
.danger-wrap{width:8px;height:120px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;position:relative;box-shadow:inset 0 0 8px rgba(0,0,0,.3)}
.danger-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#ff6b9d,#ffb347);border-radius:4px;transition:height .3s;box-shadow:0 0 8px rgba(255,107,157,.5)}
.buff-strip{display:flex;flex-direction:column;gap:6px;margin-top:8px;pointer-events:auto}
.buff-icon{width:36px;height:36px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,200,230,.25);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;cursor:pointer;transition:box-shadow .3s,transform .2s;box-shadow:0 2px 12px rgba(200,150,255,.15)}
.buff-icon:active{transform:scale(.9)}
.buff-icon .cnt{position:absolute;bottom:-4px;right:-4px;background:linear-gradient(135deg,#ff6b9d,#ff8f5e);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.buff-icon.new-buff{animation:buffGlow .5s ease 3}
.btn-row{position:absolute;top:12px;right:12px;display:flex;gap:8px;pointer-events:auto;z-index:15}
.btn-circle{width:36px;height:36px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,200,230,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 2px 10px rgba(200,150,255,.15)}
.btn-circle:active{transform:scale(.88)}
.panel-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,8,35,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s ease}
.panel-overlay.show{opacity:1;pointer-events:auto}
.panel{background:rgba(40,25,70,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,200,230,.18);border-radius:24px;padding:32px 24px;text-align:center;max-width:340px;width:85%;box-shadow:0 0 0 1px rgba(255,180,220,.08),0 8px 40px rgba(150,80,200,.25),inset 0 1px 0 rgba(255,255,255,.1);transform:scale(.85) translateY(20px);transition:transform .4s cubic-bezier(0.34,1.56,0.64,1)}
.panel-overlay.show .panel{transform:scale(1) translateY(0)}
.panel h2{font-size:clamp(20px,5vw,28px);margin-bottom:12px;background:linear-gradient(135deg,#ffb3c6,#c9b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.panel p{font-size:14px;opacity:.7;margin-bottom:16px;line-height:1.5}
.panel .btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#ff6b9d,#ffb347);border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 20px rgba(255,107,157,.4)}
.panel .btn:active{transform:scale(.95)}
.buff-panel{max-width:100%;width:100%;height:100%;border-radius:0;padding:0;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:none;background:rgba(15,8,40,.94)}
.buff-cards{display:flex;flex-direction:column;gap:14px;width:85%;max-width:320px}
.buff-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,200,230,.2);border-radius:20px;padding:18px 16px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;display:flex;align-items:center;gap:14px;box-shadow:0 0 0 1px rgba(200,150,255,.06),0 4px 20px rgba(150,80,200,.15),inset 0 1px 0 rgba(255,255,255,.06)}
.buff-card:active{transform:scale(.96);border-color:rgba(255,180,220,.5);box-shadow:0 0 20px rgba(255,150,200,.3)}
.buff-card .emoji{font-size:36px;flex-shrink:0}
.buff-card .binfo{display:flex;flex-direction:column;gap:3px;text-align:left}
.buff-card .bname{font-size:15px;font-weight:700;color:#ffe0f0}
.buff-card .bdesc{font-size:12px;opacity:.6;line-height:1.4}
.buff-card .blevel{font-size:11px;color:#ffd6a5;font-weight:600}
.event-text{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:clamp(24px,6vw,40px);font-weight:900;background:linear-gradient(135deg,#ffb3c6,#ffd6a5,#c9b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 3px 16px rgba(255,150,200,.6));opacity:0;transition:opacity .3s;pointer-events:none;z-index:20;white-space:nowrap}
.event-text.show{opacity:1}
.combo-text{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:clamp(16px,4vw,24px);font-weight:800;background:linear-gradient(135deg,#ffd6a5,#ffb3c6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 8px rgba(255,180,100,.5));opacity:0;pointer-events:none;z-index:20}
.replay-badge{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:700;color:#ff6b9d;letter-spacing:4px;opacity:0;pointer-events:none;z-index:20;text-shadow:0 0 12px rgba(255,107,157,.6)}
.go-stats{margin:12px 0;text-align:left;font-size:13px;line-height:2}
.go-stats span{float:right;font-weight:600;color:#ffd6a5}
.drop-hint{position:absolute;bottom:clamp(60px,12vh,100px);left:50%;transform:translateX(-50%);font-size:12px;opacity:.4;pointer-events:none;color:#c9b8ff}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.buff-card{animation:cardIn .4s cubic-bezier(0.34,1.56,0.64,1) backwards}
.buff-card:nth-child(2){animation-delay:.1s}
.buff-card:nth-child(3){animation-delay:.2s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shaking{animation:shake .12s linear 6}
@keyframes buffGlow{0%,100%{box-shadow:0 0 0 rgba(255,150,200,0)}50%{box-shadow:0 0 16px rgba(255,150,200,.8)}}
#nextCard{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(30,15,55,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,200,230,.18);border-radius:16px;padding:8px 14px;pointer-events:none;z-index:12;display:flex;align-items:center;gap:10px;max-width:90%;transition:opacity .3s;box-shadow:0 4px 20px rgba(150,80,200,.2),inset 0 1px 0 rgba(255,255,255,.08)}
#nextCard .nc-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;box-shadow:0 0 10px rgba(255,150,200,.3)}
#nextCard .nc-info{display:flex;flex-direction:column;gap:1px}
#nextCard .nc-name{font-size:13px;font-weight:700;color:#ffe0f0}
#nextCard .nc-tag{font-size:10px;color:#ffd6a5;font-weight:600}
#nextCard .nc-detail{font-size:10px;opacity:.6;line-height:1.3}
#nextCard .nc-rel{font-size:10px;opacity:.7;color:#c9b8ff}
.dex-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;text-align:left}
.dex-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,200,230,.1);border-radius:14px;padding:10px;display:flex;gap:8px;align-items:center}
.dex-item.locked{opacity:.35;filter:grayscale(1)}
.dex-item img{width:40px;height:40px;border-radius:50%;object-fit:cover;box-shadow:0 0 8px rgba(255,150,200,.2)}
.dex-info{display:flex;flex-direction:column;gap:1px}
.dex-info .dn{font-size:12px;font-weight:700;color:#ffe0f0}
.dex-info .dt{font-size:10px;color:#ffd6a5}
.dex-info .ds{font-size:9px;opacity:.6}
/* ===== START SCREEN ===== */
.start-screen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:200;overflow:hidden;transition:transform .6s cubic-bezier(0.4,0,0.2,1),opacity .6s ease}
.start-screen.hide{transform:translateY(-100%);opacity:0;pointer-events:none}
.start-poster{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;background-repeat:no-repeat}
.start-title{position:absolute;top:8%;left:50%;transform:translateX(-50%);font-size:clamp(22px,6vw,36px);font-weight:900;color:#e0ffff;text-align:center;white-space:nowrap;text-shadow:0 0 20px rgba(100,200,255,0.9),0 0 40px rgba(100,200,255,0.5);animation:neonBreath 2.5s ease-in-out infinite;z-index:2}
.start-hi{position:absolute;top:5%;left:4%;font-size:clamp(11px,2.5vw,15px);font-weight:700;color:#e0ffff;text-shadow:0 0 8px rgba(224,255,255,0.7);background:rgba(0,20,60,.5);backdrop-filter:blur(8px);border:1px solid rgba(100,200,255,.2);border-radius:10px;padding:6px 10px;z-index:2}
.start-lv{position:absolute;top:5%;right:4%;font-size:clamp(11px,2.5vw,15px);font-weight:700;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.8);background:rgba(40,20,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,200,50,.3);border-radius:10px;padding:6px 10px;z-index:2;cursor:pointer}
.start-play-btn{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);width:58%;max-width:260px;padding:16px 0;border:none;border-radius:50px;background:linear-gradient(135deg,#f5c518,#ff8c00);color:#1a0a00;font-size:clamp(17px,4.5vw,24px);font-weight:900;cursor:pointer;z-index:2;animation:playPulse 1.8s ease-in-out infinite;box-shadow:0 0 30px rgba(245,197,24,.5);overflow:hidden;letter-spacing:2px}
.start-play-btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:scanLight 2.2s linear infinite}
.start-play-btn:active{transform:translateX(-50%) scale(0.95)}
.start-dex-btn{position:absolute;bottom:5%;right:4%;width:46px;height:46px;border:none;border-radius:50%;background:rgba(0,30,80,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(100,200,255,.3);font-size:22px;cursor:pointer;z-index:2;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(100,200,255,.3)}
@keyframes neonBreath{0%,100%{text-shadow:0 0 10px rgba(100,200,255,.7),0 0 20px rgba(100,200,255,.4)}50%{text-shadow:0 0 20px rgba(100,200,255,1),0 0 40px rgba(100,200,255,.7),0 0 60px rgba(100,200,255,.3)}}
@keyframes playPulse{0%,100%{transform:translateX(-50%) scale(0.97);box-shadow:0 0 20px rgba(245,197,24,.4)}50%{transform:translateX(-50%) scale(1.04);box-shadow:0 0 40px rgba(245,197,24,.8)}}
@keyframes scanLight{0%{left:-100%}100%{left:200%}}
/* ===== PC RESPONSIVE ===== */
#bg-blur{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;filter:blur(40px) brightness(0.35);z-index:-1;pointer-events:none}
@media(min-width:768px){
  body{display:flex;align-items:center;justify-content:center;background:#0a0614}
  #bg-blur{display:block}
  #gc{position:relative!important;width:auto!important;height:100vh!important;max-height:100vh;aspect-ratio:9/16;border-radius:16px;box-shadow:0 0 60px rgba(150,80,255,.3)}
  #hud{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:auto;height:100vh;aspect-ratio:9/16}
  #startPanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:auto;height:100vh;aspect-ratio:9/16;border-radius:16px;overflow:hidden}
  #startPanel.hide{transform:translate(-50%,-150%)}
  .panel-overlay{position:fixed}
}
</style>
</head>

function sndDrop(){if(!sndOK('d',100))return;osc(880,0.08,'sine',0.1);osc(660,0.06,'triangle',0.07);osc(2000,0.02,'square',0.03);}
function sndLand(){if(!sndOK('l',80))return;osc(120,0.25,'sine',0.18);noise(0.15,0.12,600);}
function sndHit(){if(!sndOK('h',100))return;noise(0.1,0.1,1000);osc(150,0.15,'sine',0.12);}
function sndBuff(){const t=actx.currentTime;osc(523,0.15,'sine',0.1,t);osc(659,0.15,'sine',0.1,t+0.08);osc(784,0.15,'sine',0.1,t+0.16);}
function sndGO(){
  if(!soundOn)return;
  try{const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(600,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(100,actx.currentTime+1.2);
  g.gain.value=0.15;g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+1.2);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+1.2);
  const o2=actx.createOscillator(),g2=actx.createGain();
  o2.type='sawtooth';o2.frequency.setValueAtTime(400,actx.currentTime);
  o2.frequency.exponentialRampToValueAtTime(80,actx.currentTime+0.8);
  g2.gain.value=0.08;g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.8);
  o2.connect(g2);g2.connect(actx.destination);o2.start();o2.stop(actx.currentTime+0.8);}catch(e){}
}
function sndQuake(){osc(40,0.6,'sawtooth',0.15);noise(0.8,0.15,400);}
function sndMeow(){if(!sndOK('m',150))return;
  if(!soundOn)return;
  try{const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';const f0=600+Math.random()*200;
  o.frequency.setValueAtTime(f0,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(f0*0.65,actx.currentTime+0.3);
  const lfo=actx.createOscillator(),lfoG=actx.createGain();
  lfo.frequency.value=6;lfoG.gain.value=30;lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start();
  g.gain.value=0.1;g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.3);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.35);lfo.stop(actx.currentTime+0.35);}catch(e){}
}

let windNode=null,windGain=null;
function initWind(){
  try{
    const buf=actx.createBuffer(1,actx.sampleRate*2,actx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    windNode=actx.createBufferSource();windNode.buffer=buf;windNode.loop=true;
    const flt=actx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=300;
    windGain=actx.createGain();windGain.gain.value=0;
    windNode.connect(flt);flt.connect(windGain);windGain.connect(actx.destination);
    windNode.start();
  }catch(e){}
}
function updateWind(height){
  if(!windGain||!soundOn)return;
  windGain.gain.value=Math.min(0.08,height*0.005);
}

let particles=[];
function addP(x,y,c,cnt,spd,life,type){
  if(particles.length>300)return;
  for(let i=0;i<cnt;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*spd;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-spd*0.5,life:life||1,maxLife:life||1,c,r:2+Math.random()*2,type:type||'circle'});
  }
}
function addPawPrint(x,y){
  const cols=['#ffb3c6','#ffd6a5','#c9b8ff'];
  for(let i=0;i<4;i++){
    const a=Math.random()*Math.PI*2,s=40+Math.random()*60;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,life:1.2,maxLife:1.2,c:cols[i%3],r:4+Math.random()*3,type:'paw',rot:Math.random()*Math.PI*2});
  }
}
function addFloatWord(x,y,word){
  particles.push({x,y,vx:(Math.random()-.5)*20,vy:-70-Math.random()*40,life:1.5,maxLife:1.5,c:'#ffb3c6',r:0,type:'text',word});
}
function updParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.type!=='text')p.vy+=300*dt;
    p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}
function _drawPaw(ctx,x,y,r,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  ctx.beginPath();ctx.ellipse(0,0,r,r*1.3,0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse((i-1.5)*r*0.7,-r*1.5,r*0.55,r*0.5,0,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}
function drawParticles(ctx){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.c;
    if(p.type==='shockwave'){
      const prog=1-p.life/p.maxLife;
      ctx.globalAlpha=Math.max(0,p.life/p.maxLife)*0.7;
      ctx.strokeStyle='rgba(200,235,255,0.9)';ctx.lineWidth=Math.max(0.5,3*(1-prog));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*prog,0,Math.PI*2);ctx.stroke();
    }else if(p.type==='paw'){
      _drawPaw(ctx,p.x,p.y,p.r,p.rot||0);
    }else if(p.type==='text'){
      ctx.font=`bold 14px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor=p.c;ctx.shadowBlur=10;
      ctx.fillText(p.word,p.x,p.y);ctx.shadowBlur=0;
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    }
  });
  ctx.globalAlpha=1;
}

let game;
class Game{
constructor(){
  this.state='menu';this.cats=[];this.score=0;this.height=0;this.maxH=0;
  this.danger=0;this.dropCount=0;this.combo=0;this.comboTimer=0;

  this.buffs=new Map();this.buffCardboard=0;this.buffNineLives=false;
  this.buffCatnip=0;this.buffTimeSlow=0;this.buffDblScore=0;this.buffShrink=0;
  this.platW=W*0.55;this.platTilt=0;this.platSwayPhase=0;this.stage=0;this.windForce=0;
  this.eventTimer=8+Math.random()*7;this.shakeX=0;this.shakeY=0;this.shakeTimer=0;this.shakeIntensity=6;this.preShake=0;this.collapseTimer=-1;
  this.replayBuf=[];this.replayIdx=0;this.replayTimer=0;this.slowmoTimer=0;
  this.floatTexts=[];
  this.farthestCat=null;this.bestMoment='';this.time=0;
  this.socialLog={groom:0,cuddle:0,soothe:0,pillar:0,crush:0,fight:0,bully:0,pushed:0};

makeCat(x,y,breed){
  const d=BD[breed];
  return{x,y,vx:0,vy:0,angle:0,angVel:0,
    r:d.r*(this.buffShrink>0?0.7:1),mass:d.mass,breed,
    gripTimer:0,gripForce:0,deform:0,crushW:0,squashT:0,squashAmt:0,
    expr:'normal',exprTimer:0,exprPri:0,
    stableTime:0,edgeTime:0,onGround:false,landed:false,_scored:false,id:Math.random(),
    crushCount:0,maxFlyDist:0};
}

physics(dt){
  const gMul=this.getBuffVal('gravTweak',1,-0.2)*(this.stage===2?0.7:1);
  const featherMul=this.getBuffVal('feather',1,-0.15);
  const timeMul=this.buffTimeSlow>0?0.7:1;
  const sdt=dt*timeMul/SUB;
  const platHW=this.platW/2;
  const platCX=W/2;
  const tilt=this.platTilt;
  const hasWall=this.buffCardboard>0;
  const wind=this.windForce;

  for(let s=0;s<SUB;s++){
    for(const c of this.cats){
      if(!c.landed){
        c.vy+=G*gMul*featherMul*sdt;
        if(wind)c.vx+=wind*sdt;
      }else{
        c.vy+=G*sdt;
        if(wind)c.vx+=wind*sdt*0.3;
        if(c.gripTimer>0){
          c.vx*=Math.pow(0.85,sdt*60);
          c.gripTimer-=sdt;
        }
      }
      c.squashT=Math.max(0,c.squashT-sdt*4);
      c.vx*=Math.pow(0.998,sdt*60);
      c.vy*=Math.pow(0.998,sdt*60);
      c.angVel*=Math.pow(0.993,sdt*60);
      c.x+=c.vx*sdt;c.y+=c.vy*sdt;c.angle+=c.angVel*sdt;
    }

    if(this.getBuffVal('magnet',0,1)>0){
      for(let i=0;i<this.cats.length;i++){
        for(let j=i+1;j<this.cats.length;j++){
          const a=this.cats[i],b=this.cats[j];
          if(a.breed===b.breed){
            const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);
            if(d>0&&d<a.r*6){const f=15*sdt/d;a.vx+=dx*f;a.vy+=dy*f;b.vx-=dx*f;b.vy-=dy*f;}
          }
        }
      }
    }

    for(let i=0;i<this.cats.length;i++){
      for(let j=i+1;j<this.cats.length;j++){
        this.collideCats(this.cats[i],this.cats[j],sdt);
      }
    }

    for(const c of this.cats){
      const py=platY+Math.sin(tilt)*(c.x-platCX);
      if(c.y+c.r>py&&c.x>platCX-platHW&&c.x<platCX+platHW){
        c.y=py-c.r;
        const impact=Math.abs(c.vy);
        if(!c.landed&&impact>50){
          sndLand();this.onLand(c,impact);
          c.squashAmt=Math.min(0.5,impact/600);c.squashT=1;
          if(c.mass>=1.5){this.shakeTimer=0.15;this.shakeIntensity=c.mass*3;}
          if(impact<120&&Math.abs(c.vx)<30){
            addP(c.x,c.y+c.r,'#ffd700',6,60,0.6);
            addPawPrint(c.x,c.y);
            addFloatWord(c.x,c.y-c.r-20,'Perfect!');
            this.floatText(c.x,c.y-c.r-10,'Perfect!','#ffd700');
            this.perfectCount=(this.perfectCount||0)+1;
            if(this.perfectCount>=10)unlockAch('perfect_10');
          }
        }
        c.vy*=-REST;if(Math.abs(c.vy)<20)c.vy=0;
        c.vx*=(1-FRIC*sdt*10);
        c.landed=true;c.onGround=true;
        if(c.gripTimer<=0)c.gripTimer=GRIP_T*(this.getBuffVal('ironClaw',1,0.5));
      }else{
        c.onGround=false;
      }

      if(hasWall){
        const wallL=platCX-platHW-5,wallR=platCX+platHW+5;
        if(c.x-c.r<wallL){c.x=wallL+c.r;c.vx=Math.abs(c.vx)*0.5;}
        if(c.x+c.r>wallR){c.x=wallR-c.r;c.vx=-Math.abs(c.vx)*0.5;}
      }
    }
  }

  for(const c of this.cats){
    if(c.landed){
      let above=0;
      for(const o of this.cats){
        if(o!==c&&o.y<c.y&&Math.abs(o.x-c.x)<c.r*1.5)above+=o.mass;
      }
      c.crushW=above;
      c.deform=Math.min(0.6,c.deform+above*dt*0.12);
    }
  }

  for(const c of this.cats){
    if(c.landed)continue;
    for(const o of this.cats){
      if(!o.landed||o===c)continue;
      const dx=c.x-o.x,dy=c.y-o.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<c.r+o.r+2&&c.y<o.y&&Math.abs(c.vy)<60){
        c.landed=true;
        if(c.gripTimer<=0)c.gripTimer=GRIP_T*(this.getBuffVal('ironClaw',1,0.5));
        const impact=Math.abs(c.vy);
        if(impact>50){sndLand();this.onLand(c,impact);}
        else if(!c._scored){c._scored=true;this.onLand(c,impact);}
        break;
      }
    }
  }

  for(let i=this.cats.length-1;i>=0;i--){
    const c=this.cats[i];
    if(c.y>H+100||c.x<-100||c.x>W+100){
      if(c.landed){
        this.danger=Math.min(100,this.danger+8);
        if(BD[c.breed].mass<1.0){
          this.score=Math.max(0,this.score-80);
          this.floatText(c.x,Math.min(c.y,H-20),'-80 小猫被挤下去','#ff2222');this.socialLog.pushed++;
        }
      }
      this.cats.splice(i,1);
    }
  }
}

collideCats(a,b,sdt){
  const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy);
  const minD=a.r+b.r;
  if(dist>=minD||dist<0.01)return;
  const nx=dx/dist,ny=dy/dist;
  const overlap=minD-dist;
  const totalM=a.mass+b.mass;
  a.x-=nx*overlap*(b.mass/totalM)*0.8;
  a.y-=ny*overlap*(b.mass/totalM)*0.8;
  b.x+=nx*overlap*(a.mass/totalM)*0.8;
  b.y+=ny*overlap*(a.mass/totalM)*0.8;

  const dvx=a.vx-b.vx,dvy=a.vy-b.vy;
  const dvn=dvx*nx+dvy*ny;
  if(dvn<=0)return;
  const restBuf=REST*(this.getBuffVal('bouncy',1,0.5));
  const j=dvn*(1+restBuf)/totalM;
  a.vx-=j*b.mass*nx;a.vy-=j*b.mass*ny;
  b.vx+=j*a.mass*nx;b.vy+=j*a.mass*ny;

  const tx=-ny,ty=nx;
  const dvt=dvx*tx+dvy*ty;
  const jf=dvt*FRIC*0.3/totalM;
  a.vx-=jf*b.mass*tx;a.vy-=jf*b.mass*ty;
  b.vx+=jf*a.mass*tx;b.vy+=jf*a.mass*ty;
  a.angVel+=jf*0.1;b.angVel-=jf*0.1;

  const impact=Math.abs(dvn);
  if(impact>120){this.setExpr(a,'pain',8,1.2);this.setExpr(b,'pain',8,1.2);sndHit();
    addP((a.x+b.x)/2,(a.y+b.y)/2,'#ffcc00',4,80,0.5);}
  else if(impact>60){this.setExpr(a,'surprised',5,0.6);this.setExpr(b,'surprised',5,0.6);}

  const r=rel(a.breed,b.breed);
  if(r==='hostile'){
    const push=30*sdt;a.vx-=nx*push;b.vx+=nx*push;
    if(Math.random()<0.02)addP((a.x+b.x)/2,(a.y+b.y)/2,'#ff4444',3,60,0.8);
  }else if(r==='intimate'){
    const pull=10*sdt;a.vx+=nx*pull;b.vx-=nx*pull;
    if(Math.random()<0.02)addP((a.x+b.x)/2,(a.y+b.y)/2,'#ff69b4',2,30,1);
  }
}

getBuffVal(id,base,perStack){
  const b=this.buffs.get(id);
  return b?base+perStack*b.count:base;
}


setExpr(c,expr,pri,dur){
  if(pri>=c.exprPri||c.exprTimer<=0){c.expr=expr;c.exprPri=pri;c.exprTimer=dur||2;}
}

updateExpressions(dt){
  for(const c of this.cats){
    c.exprTimer-=dt;
    if(c.exprTimer<=0){c.expr='normal';c.exprPri=0;}
    const spd=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
    if(!c.landed&&spd>200)this.setExpr(c,'fear',7,0.5);
    if(c.landed&&c.deform>0.3)this.setExpr(c,'dizzy',9,1);
    if(c.landed){
      c.stableTime+=dt;
      if(c.stableTime>3&&spd<30){
        const h=(platY-c.y)/CAT_R;
        if(h>3)this.setExpr(c,'smug',2,2);
        else this.setExpr(c,'happy',1,2);
      }
    }else{c.stableTime=0;}
    const platHW=this.platW/2,platCX=W/2;
    if(c.landed&&(Math.abs(c.x-platCX)>platHW-c.r*1.5)){
      c.edgeTime+=dt;
      if(c.edgeTime>0.3){
        this.setExpr(c,'tremble',6,0.5);
        // 摩擦烟尘粒子：更频繁、更明显
        if(Math.random()<0.5){
          const dustX=c.x+(c.x>platCX?c.r:-c.r)*0.8;
          addP(dustX,c.y+c.r*0.9,'rgba(200,180,160,0.7)',2,25,0.5);
        }
      }
    }else{c.edgeTime=0;}
  }
}

drawExpression(ctx,c,r){
  if(c.expr==='normal')return;
  const EXPR_EMOJI={fear:'😱',smug:'😏',dizzy:'😵‍💫',pain:'🤕',tremble:'😰',surprised:'😲',angry:'😾',happy:'😸'};
  const emoji=EXPR_EMOJI[c.expr];
  if(!emoji)return;
  const bx=0,by=-r-14;
  const bw=20,bh=18,br=6;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.moveTo(bx-bw/2+br,by-bh);
  ctx.lineTo(bx+bw/2-br,by-bh);
  ctx.quadraticCurveTo(bx+bw/2,by-bh,bx+bw/2,by-bh+br);
  ctx.lineTo(bx+bw/2,by-br);
  ctx.quadraticCurveTo(bx+bw/2,by,bx+bw/2-br,by);
  ctx.lineTo(bx+3,by);
  ctx.lineTo(bx,by+5);
  ctx.lineTo(bx-3,by);
  ctx.lineTo(bx-bw/2+br,by);
  ctx.quadraticCurveTo(bx-bw/2,by,bx-bw/2,by-br);
  ctx.lineTo(bx-bw/2,by-bh+br);
  ctx.quadraticCurveTo(bx-bw/2,by-bh,bx-bw/2+br,by-bh);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.5;ctx.stroke();
  ctx.font=`${Math.round(bh*0.75)}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,bx,by-bh/2);
}


onLand(c,impact){
  c.gripTimer=GRIP_T*(this.getBuffVal('ironClaw',1,0.5));
  c.gripForce=1;c.landed=true;
  if(impact>80)this.setExpr(c,'pain',8,1);
  const d=BD[c.breed];
  const pts=Math.round(10*d.hv*(this.buffDblScore>0?2:1));
  this.score+=pts;
  this.floatText(c.x,c.y-c.r,'+'+pts,'#ffcc00');
  this.combo++;this.comboTimer=2;this.maxCombo=Math.max(this.maxCombo,this.combo);
  if(this.combo>2){
    const bonus=this.combo*5;
    this.score+=bonus;
    $combo.textContent=this.combo+'x COMBO! +'+bonus;$combo.style.opacity='1';
    setTimeout(()=>{$combo.style.opacity='0';},1000);
  }
  if(!this.collection.includes(c.breed)){
    this.collection.push(c.breed);
    localStorage.setItem('cat_collection',JSON.stringify(this.collection));
  }
  // 更新图鉴统计
  const cs=this.catStats;
  if(!cs[c.breed])cs[c.breed]={score:0,maxH:0};
  cs[c.breed].score=(cs[c.breed].score||0)+10;
  cs[c.breed].maxH=Math.max(cs[c.breed].maxH||0,this.height);
  localStorage.setItem('cat_stats',JSON.stringify(cs));
  sndMeow();
}

update(dt){
  this.time+=dt;
  if(this.state==='replay'){this.updateReplay(dt);return;}
  this.dropCD=Math.max(0,this.dropCD-dt);
  this.comboTimer-=dt;if(this.comboTimer<=0)this.combo=0;
  if(this.socialComboTimer>0){this.socialComboTimer-=dt;if(this.socialComboTimer<=0)this.socialCombo=0;}
  if(this.goldFlash>0)this.goldFlash=Math.max(0,this.goldFlash-dt*1.5);

  this.updatePlatform(dt);
  this.physics(dt);
  this.updateExpressions(dt);
  this.updateSocial(dt);
  updParticles(dt);
  this.updateFloatTexts(dt);

  this.eventTimer-=dt;
  if(this.eventTimer<=1&&this.preShake===0){this.preShake=1;this.shakeTimer=0.8;this.shakeIntensity=2;}
  if(this.eventTimer<=0){this.preShake=0;this.triggerEvent();this.eventTimer=8+Math.random()*7;}

  if(this.shakeTimer>0){
    this.shakeTimer-=dt;
    const si=this.shakeIntensity*(this.shakeTimer>0?1:0);
    this.shakeX=(Math.random()-0.5)*si;this.shakeY=(Math.random()-0.5)*si;
    if(this.shakeTimer<=0){this.shakeX=0;this.shakeY=0;this.shakeIntensity=6;}
  }

  let topY=platY;
  for(const c of this.cats)if(c.landed&&c.y-c.r<topY)topY=c.y-c.r;
  this.height=Math.max(0,(platY-topY)/CAT_R);
  this.maxH=Math.max(this.maxH,this.height);
  // 相机：让平台在屏幕下方25%，塔顶在上方25%之间
  this.camTargetY=-(this.height*CAT_R*0.5);
  const zoomBase=this.height<3?1.5:Math.max(0.5,1.5-this.height*0.04);
  this.camTargetZoom=zoomBase;
  this.camY+=(this.camTargetY-this.camY)*0.05;
  this.camZoom+=(this.camTargetZoom-this.camZoom)*0.03;

  let fallen=0;
  for(const c of this.cats)if(!c.landed&&c.y>platY+c.r*2)fallen++;
  if(fallen>0)this.danger=Math.min(100,this.danger+fallen*2*dt);
  this.danger=Math.max(0,this.danger-0.5*dt);

  this.maxTilt=Math.max(this.maxTilt,Math.abs(this.platTilt)*180/Math.PI);
  for(const c of this.cats){
    const fd=Math.max(Math.abs(c.x-W/2),Math.abs(c.y-platY));
    if(fd>this.maxFlyDist)this.maxFlyDist=fd;
    if(fd>c.maxFlyDist)c.maxFlyDist=fd;
  }
  this.recordReplay();

  $score.textContent=this.score;
  $height.textContent='高度: '+this.height.toFixed(1)+'m';
  updateWind(this.height);
  $danger.style.height=this.danger+'%';

  if(this.danger>=100){
    if(this.buffNineLives){this.buffNineLives=false;this.danger=50;this.removeBuff('nineLives');}
    else{this.startSlowmo();}
  }

  // 全线崩塌检测：台面无猫且无下落中的猫
  if(this.dropCount>0){
    const grounded=this.cats.filter(c=>c.landed).length;
    const falling=this.cats.filter(c=>!c.landed).length;
    if(grounded===0&&falling===0){
      if(this.collapseTimer<0)this.collapseTimer=3;
      this.collapseTimer-=dt;
      if(this.collapseTimer<=0)this.startSlowmo();
    }else{
      this.collapseTimer=-1;
    }
  }
  if(typeof checkAchievements==='function')checkAchievements(this);
}

updatePlatform(dt){
  const s=this.score;
  const shrink=Math.max(0.3,1-Math.floor(s/100)*0.1);
  const baseW=W*0.55*shrink;
  const lv=Math.floor(s/1000); // 每1000分一阶段
  if(lv===0){
    this.stage=0;this.windForce=0;
    this.platW=baseW;this.platSwayPhase+=dt*0.5;
    this.platTilt=Math.sin(this.platSwayPhase)*0.02*(Math.min(s,999)/1000);
  }else if(lv===1){
    this.stage=1;
    this.platW=baseW;this.platSwayPhase+=dt*1.0;
    this.platTilt=Math.sin(this.platSwayPhase)*0.06;
    this.windForce=Math.sin(this.time*0.7)*15;
  }else if(lv===2){
    this.stage=2;
    this.platW=baseW;this.platSwayPhase+=dt*1.8;
    this.platTilt=Math.sin(this.platSwayPhase)*0.1;
    this.windForce=Math.sin(this.time*0.5)*8;
  }else{
    // Lv3+：狂风+局部地震
    this.stage=2;
    this.platW=baseW;this.platSwayPhase+=dt*2.2;
    this.platTilt=Math.sin(this.platSwayPhase)*0.14;
    this.windForce=Math.sin(this.time*0.4)*30+Math.sin(this.time*1.3)*15;
    // 局部地震：随机弹起1只猫
    if(Math.random()<dt*0.3){
      const landed=this.cats.filter(c=>c.landed);
      if(landed.length>0){
        const c=landed[Math.floor(Math.random()*landed.length)];
        c.vy-=80+Math.random()*60;c.vx+=(Math.random()-0.5)*60;
      }
    }
  }
  if(this.getBuffVal('bigEater',0,1)>0)this.platW*=1.2;
}

updateSocial(dt){
  const catnipActive=this.buffCatnip>0;
  this.socialCD=(this.socialCD||0)-dt;
  if(this.socialCD>0)return;
  this.socialCD=0.5;
  for(let i=0;i<this.cats.length;i++){
    const a=this.cats[i];if(!a.landed)continue;
    const da=BD[a.breed];
    // pillar bonus
    if((a.breed==='maine'||a.breed==='orange')&&a.stableTime>5&&!a._pillarScored){
      a._pillarScored=true;
      this.score+=100;this.floatText(a.x,a.y-a.r,'+100 巨猫支柱','#ffd700');this.socialLog.pillar++;
    }
    // pressure check
    if(da.pressRisk>0){
      for(const o of this.cats){
        if(o===a||!o.landed||o.y>=a.y)continue;
        if(Math.abs(o.x-a.x)<a.r*1.2&&a.mass>o.mass*1.3&&Math.random()<da.pressRisk*0.02){
          this.score=Math.max(0,this.score-30);
          this.floatText(o.x,o.y-o.r,'-30 被压晕','#ff6666');this.socialLog.crush++;o.crushCount++;
          this.setExpr(o,'dizzy',9,2);addP(o.x,o.y,'#ffcc00',3,40,0.6);
        }
      }
    }
    // active cat wiggle
    if(da.personality==='active'&&a.stableTime>2&&Math.random()<0.01){
      a.vx+=(Math.random()-0.5)*60;a.angVel+=(Math.random()-0.5)*0.5;
    }
    for(let j=i+1;j<this.cats.length;j++){
      const b=this.cats[j];if(!b.landed)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>a.r+b.r+10)continue;
      const db=BD[b.breed];
      const r=catnipActive?'friendly':rel(a.breed,b.breed);
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      // friendly interactions
      if(da.personality==='friendly'||db.personality==='friendly'){
        if(Math.random()<0.008*Math.max(da.harmony,db.harmony)){
          if(b.expr==='fear'||b.expr==='pain'||a.expr==='fear'||a.expr==='pain'){
            this.score+=30;this.floatText(mx,my-20,'+30 安抚','#88ddff');this.socialLog.soothe++;
            this.setExpr(a,'happy',3,2);this.setExpr(b,'happy',3,2);
          }else{
            this.score+=40;this.floatText(mx,my-20,'+40 舔毛','#ffaacc');this.socialLog.groom++;
            addP(mx,my-15,'#ff69b4',2,20,1);
            addFloatWord(mx,my-35,'舔毛~');this._socialHit(mx,my);
          }
        }
      }
      // intimate bonus
      if(r==='intimate'&&Math.random()<0.006){
        this.score+=60;this.floatText(mx,my-20,'+60 贴贴','#ff69b4');this.socialLog.cuddle++;
        addP(mx,my-15,'#ff69b4',3,25,1.5);
        addFloatWord(mx,my-40,'蹭蹭♡');this._socialHit(mx,my);
        this.setExpr(a,'happy',3,2);this.setExpr(b,'happy',3,2);
      }
      // hostile fight
      if(r==='hostile'&&!catnipActive){
        const fightChance=Math.max(da.aggr,db.aggr);
        if(Math.random()<fightChance*0.015){
          this.score=Math.max(0,this.score-50);
          this.floatText(mx,my-20,'-50 打架','#ff4444');this.socialLog.fight++;
          addP(mx,my,'#ff4444',4,50,0.8);
          this.setExpr(a,'angry',6,1.5);this.setExpr(b,'angry',6,1.5);
          a.vx+=(a.x<b.x?-40:40);b.vx+=(b.x<a.x?-40:40);
          sndHit();
        }
      }
      // aggressive bully
      if(da.personality==='aggressive'&&db.mass<da.mass*0.6&&Math.random()<0.003){
        this.score=Math.max(0,this.score-30);
        this.floatText(b.x,b.y-b.r,'-30 被欺负','#ff8844');this.socialLog.bully++;
        this.setExpr(b,'fear',7,1.5);b.vx+=(b.x-a.x)*2;
      }else if(db.personality==='aggressive'&&da.mass<db.mass*0.6&&Math.random()<0.003){
        this.score=Math.max(0,this.score-30);
        this.floatText(a.x,a.y-a.r,'-30 被欺负','#ff8844');this.socialLog.bully++;
        this.setExpr(a,'fear',7,1.5);a.vx+=(a.x-b.x)*2;
      }
    }
  }
}

floatText(x,y,text,color){
  if(this.floatTexts.length>30)return;
  this.floatTexts.push({x,y,text,color:color||'#fff',life:1.5,maxLife:1.5});
}

_socialHit(x,y){
  this.socialComboTimer=5;
  this.socialCombo++;
  if(this.socialCombo>=3){
    this.socialCombo=0;
    this.goldFlash=0.6;
    this.floatText(W/2,H*0.4,'和谐社区！','#ffd700');
    addFloatWord(W/2,H*0.35,'✨ 和谐社区 ✨');
  }
}

updateFloatTexts(dt){
  for(let i=this.floatTexts.length-1;i>=0;i--){
    const f=this.floatTexts[i];f.y-=30*dt;f.life-=dt;
    if(f.life<=0)this.floatTexts.splice(i,1);
  }
}

drawFloatTexts(ctx){
  for(const f of this.floatTexts){
    ctx.globalAlpha=Math.max(0,f.life/f.maxLife);
    ctx.font='bold 13px sans-serif';ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(f.text,f.x+1,f.y+1);
    ctx.fillStyle=f.color;ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

triggerEvent(){
  if(this.cats.length<3)return;
  const r=Math.random();
  const et=$event;
  if(r<0.4){
    et.textContent='🌋 地震！';et.classList.add('show');
    setTimeout(()=>et.classList.remove('show'),2000);
    this.shakeTimer=2;this.shakeIntensity=10;sndQuake();
    for(const c of this.cats){
      if(c.landed){
        c.vx+=(Math.random()-0.5)*200;c.gripTimer*=0.5;
        const d=BD[c.breed];
        if(d.personality==='aggressive'){
          this.setExpr(c,'angry',8,2);
          for(const o of this.cats){
            if(o!==c&&o.landed){
              const dx=o.x-c.x;if(Math.abs(dx)<c.r*3)o.vx+=dx>0?80:-80;
            }
          }
        }else if(d.personality==='timid'){
          this.setExpr(c,'fear',7,2);
        }
      }
    }
  }else if(r<0.7){
    const sc=this.cats[Math.floor(Math.random()*this.cats.length)];
    et.textContent='🤧 '+BNAME[sc.breed]+'打喷嚏！';et.classList.add('show');
    setTimeout(()=>et.classList.remove('show'),2000);
    sndMeow();
    const sneezeR=sc.r*5;
    for(const c of this.cats){
      const dx=c.x-sc.x,dy=c.y-sc.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<sneezeR&&c!==sc){
        const f=(sneezeR-d)/sneezeR*200;
        c.vx+=dx/Math.max(d,1)*f;c.vy+=dy/Math.max(d,1)*f-80;
        if(c.mass<sc.mass)c.squashT=0.5;c.squashAmt=0.2;
      }
    }
    addP(sc.x,sc.y-sc.r,'#aaddff',10,120,0.8);
    particles.push({x:sc.x,y:sc.y,vx:0,vy:0,life:0.6,maxLife:0.6,c:'#aaddff',r:sc.r*6,type:'shockwave'});
  }else{
    et.textContent='😾 集体炸毛！';et.classList.add('show');
    setTimeout(()=>et.classList.remove('show'),2000);
    for(const c of this.cats){
      if(c.landed){c.vy-=60+Math.random()*40;c.gripTimer=0;}
      this.setExpr(c,'fear',7,1.5);
    }
    this.shakeTimer=0.5;this.shakeIntensity=6;
  }
}

showBuffSelect(){
  this.state='buff-select';
  const pool=[...ALL_BUFFS].sort(()=>Math.random()-0.5).slice(0,3);
  const container=document.getElementById('buffCards');
  container.innerHTML='';
  pool.forEach(b=>{
    const cur=this.buffs.get(b.id);
    const lvl=cur?cur.count:0;
    const card=document.createElement('div');card.className='buff-card';
    card.innerHTML=`<div class="emoji">${b.icon}</div><div class="binfo"><div class="bname">${b.name}</div><div class="bdesc">${b.desc}</div>${lvl?`<div class="blevel">Lv.${lvl} → Lv.${lvl+1}</div>`:'<div class="blevel">新获得</div>'}</div>`;
    card.onclick=()=>{this.applyBuff(b);document.getElementById('buffPanel').classList.remove('show');this.state='playing';sndBuff();};
    container.appendChild(card);
  });
  document.getElementById('buffPanel').classList.add('show');
}

applyBuff(b){
  const cur=this.buffs.get(b.id);
  if(cur)cur.count++;else this.buffs.set(b.id,{...b,count:1});
  if(b.id==='cardboard')this.buffCardboard+=20;
  if(b.id==='nineLives')this.buffNineLives=true;
  if(b.id==='catnip')this.buffCatnip+=15;
  if(b.id==='timeSlow')this.buffTimeSlow+=15;
  if(b.id==='dblScore')this.buffDblScore+=15;
  if(b.id==='shrink')this.buffShrink+=5;
  this.checkBuffSynergy();
  this.updateBuffUI(b.id);
}

checkBuffSynergy(){
  const ic=this.buffs.get('ironClaw'),gv=this.buffs.get('gravTweak');
  if(ic&&gv&&ic.count>=2&&gv.count>=2&&!this._synergyStable){
    this._synergyStable=true;
    this.floatText(W/2,H*0.3,'🛡️ 超稳状态！抓握+重力双重加持','#ffd700');
    sndBuff();
  }
  const mg=this.buffs.get('magnet'),cn=this.buffs.get('catnip');
  if(mg&&cn&&mg.count>=2&&!this._synergyHarmony){
    this._synergyHarmony=true;
    this.floatText(W/2,H*0.3,'💕 和谐磁场！猫咪互相吸引+友好','#ff69b4');
    sndBuff();
  }
  const ds=this.buffs.get('dblScore'),fe=this.buffs.get('feather');
  if(ds&&fe&&ds.count>=1&&fe.count>=2&&!this._synergyRain){
    this._synergyRain=true;
    this.floatText(W/2,H*0.3,'✨ 黄金雨！轻盈+双倍=暴富','#ffcc00');
    sndBuff();
  }
}

removeBuff(id){this.buffs.delete(id);this.updateBuffUI();}

updateBuffUI(newId){
  const strip=document.getElementById('buffStrip');strip.innerHTML='';
  this.buffs.forEach((b,id)=>{
    const el=document.createElement('div');el.className='buff-icon'+(id===newId?' new-buff':'');
    el.innerHTML=b.icon+`<span class="cnt">${b.count}</span>`;
    el.style.pointerEvents='auto';
    el.onclick=()=>{
      let tip=document.getElementById('buffTip');
      if(!tip){tip=document.createElement('div');tip.id='buffTip';
        tip.style.cssText='position:fixed;z-index:300;background:rgba(20,10,45,.92);border:1px solid rgba(100,200,255,.3);border-radius:10px;padding:8px 12px;font-size:12px;pointer-events:none;backdrop-filter:blur(16px);max-width:150px;transition:opacity .3s;color:#e0ffff';
        tip.innerHTML+='<div id="buffTipArrow" style="position:absolute;right:-6px;top:12px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:6px solid rgba(100,200,255,.3)"></div>';
        document.body.appendChild(tip);}
      const r=el.getBoundingClientRect();
      tip.innerHTML=`<b style="color:#ffd6a5">${b.name}</b><br><span style="opacity:.7">${b.desc||''}</span><br><span style="color:#ffb3c6">叠加: ${b.count}层</span><div style="position:absolute;right:-6px;top:12px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:6px solid rgba(100,200,255,.3)"></div>`;
      tip.style.left=(r.left-158)+'px';tip.style.top=(r.top+r.height/2-20)+'px';tip.style.opacity='1';
      clearTimeout(tip._t);tip._t=setTimeout(()=>{tip.style.opacity='0';},1500);
    };
    strip.appendChild(el);
    if(id===newId)setTimeout(()=>el.classList.remove('new-buff'),1500);
  });
}

recordReplay(){
  const frame={cats:this.cats.map(c=>({x:c.x,y:c.y,angle:c.angle,deform:c.deform,breed:c.breed,expr:c.expr,r:c.r,squashT:c.squashT,squashAmt:c.squashAmt})),camY:this.camY,time:this.time};
  if(this.replayBuf.length>=100)this.replayBuf[this.replayIdx%100]=frame;
  else this.replayBuf.push(frame);
}

startSlowmo(){
  sndGO();this.state='replay';this.replayIdx=0;this.replayTimer=0;this.slowmoTimer=0;
  let maxV=0;
  for(const c of this.cats){
    const v=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
    if(v>maxV){maxV=v;this.farthestCat=c;}
  }
  this.bestMoment=this.genBestMoment();
  document.getElementById('replayBadge').style.opacity='1';
  for(const c of this.cats)this.setExpr(c,'fear',10,5);
}

updateReplay(dt){
  this.slowmoTimer+=dt;
  this.camTargetZoom=0.7;this.camZoom+=(this.camTargetZoom-this.camZoom)*0.03;
  if(this.farthestCat){
    this.camTargetY=-(this.farthestCat.y-H*0.5);
    this.camY+=(this.camTargetY-this.camY)*0.02;
  }
  this.replayTimer+=dt*0.15;
  this.replayIdx=Math.min(Math.floor(this.replayTimer*20),this.replayBuf.length-1);
  if(this.slowmoTimer>4){
    document.getElementById('replayBadge').style.opacity='0';
    this.gameOver();
  }
}

gameOver(){
  this.state='gameover';
  if(this.score>this.hiScore){this.hiScore=this.score;localStorage.setItem('cat_hi_score',this.hiScore);}
  if(this.maxH>this.hiHeight){this.hiHeight=this.maxH;localStorage.setItem('cat_hi_height',this.hiHeight.toFixed(1));}
  this.bestMoment=this.genBestMoment();
  const report=this.genSocialReport();
  const stats=document.getElementById('goStats');
  stats.innerHTML=`<div>得分 <span>${this.score}</span></div><div>最高高度 <span>${this.maxH.toFixed(1)}m</span></div><div>猫咪数量 <span>${this.cats.length}</span></div><div>最大连击 <span>${this.maxCombo}x</span></div><div>历史最高 <span>${this.hiScore}</span></div><div style="margin-top:8px;font-size:12px;opacity:.8;text-align:center;line-height:1.6">${report}</div>`;
  document.getElementById('goPanel').classList.add('show');
}

genSocialReport(){
  const s=this.socialLog;
  const good=s.groom*40+s.cuddle*60+s.soothe*30+s.pillar*100;
  const bad=s.fight*50+s.crush*30+s.bully*30+s.pushed*80;
  const goods=[[s.cuddle,'贴贴'],[s.groom,'舔毛'],[s.soothe,'安抚'],[s.pillar,'巨猫支柱']].filter(x=>x[0]>0).sort((a,b)=>b[0]-a[0]);
  const bads=[[s.fight,'打架'],[s.crush,'压晕'],[s.bully,'欺负'],[s.pushed,'挤下去']].filter(x=>x[0]>0).sort((a,b)=>b[0]-a[0]);
  const lines=[];
  if(goods.length)lines.push('💕 最佳互动：'+goods[0][1]+' ×'+goods[0][0]+'（+'+good+'分）');
  if(bads.length)lines.push('💥 最大灾难：'+bads[0][1]+' ×'+bads[0][0]+'（-'+bad+'分）');
  // 受压最惨之猫
  const mostCrushed=this.cats.filter(c=>c.crushCount>0).sort((a,b)=>b.crushCount-a.crushCount)[0];
  if(mostCrushed)lines.push('😵 受压最惨：'+mostCrushed.breed+' 被压了'+mostCrushed.crushCount+'次');
  // 最远流放距离
  const mostExiled=this.cats.filter(c=>c.maxFlyDist>0).sort((a,b)=>b.maxFlyDist-a.maxFlyDist)[0];
  if(mostExiled&&mostExiled.maxFlyDist>150)lines.push('🚀 最远流放：'+mostExiled.breed+' 飞出'+Math.round(mostExiled.maxFlyDist)+'px');
  // 猫塔八卦简报
  if(s.cuddle>0&&s.fight>0)lines.push('📰 八卦简报：白天贴贴'+s.cuddle+'次，晚上打架'+s.fight+'次，猫际关系复杂');
  else if(s.pillar>0)lines.push('📰 八卦简报：出现了'+s.pillar+'位巨猫支柱，猫塔稳如泰山');
  else if(s.pushed>0)lines.push('📰 八卦简报：'+s.pushed+'只猫被挤下去，猫塔内卷严重');
  if(!lines.length)return '🐱 一片祥和，猫咪们相安无事~';
  return lines.join('<br>');
}

genBestMoment(){
  const lines=[];
  if(this.maxFlyDist>300)lines.push('一只猫飞出了'+Math.round(this.maxFlyDist)+'像素！');
  if(this.maxTilt>20)lines.push('猫塔倾斜了'+Math.round(this.maxTilt)+'°竟然没倒！');
  if(this.maxCombo>5)lines.push(this.maxCombo+'连击！手速惊人！');
  if(this.socialLog.cuddle>3)lines.push('贴贴'+this.socialLog.cuddle+'次，爱意满满~');
  if(this.socialLog.fight>5)lines.push('打架'+this.socialLog.fight+'次，战场如修罗场！');
  if(this.cats.length>20)lines.push(this.cats.length+'只猫的史诗级崩塌！');
  if(this.stage>=2)lines.push('冲上了云端！');
  return lines.length?lines[Math.floor(Math.random()*lines.length)]:'一场精彩的猫咪堆叠！';
}

  sctx.fillStyle=grd;sctx.fillRect(0,0,sw,sh);
  sctx.fillStyle='#fff';sctx.font='bold 24px sans-serif';sctx.textAlign='center';
  sctx.fillText('🐱 猫咪叠叠乐',sw/2,50);
  sctx.font='15px sans-serif';sctx.fillStyle='#ffcc00';
  sctx.fillText('得分: '+this.score+'  高度: '+this.maxH.toFixed(1)+'m',sw/2,90);
  sctx.fillStyle='#ff6b35';sctx.font='bold 13px sans-serif';
  sctx.fillText('🏆 最离谱瞬间',sw/2,130);
  sctx.fillStyle='#fff';sctx.font='12px sans-serif';
  sctx.fillText(this.bestMoment,sw/2,155);
  const s=this.socialLog;
  sctx.fillStyle='#88ddff';sctx.font='11px sans-serif';

  if(s.groom)sctx.fillText('🐾 舔毛 ×'+s.groom,sw/2,sy),sy+=18;
  if(s.fight)sctx.fillText('💥 打架 ×'+s.fight,sw/2,sy),sy+=18;
  if(this.maxCombo>2)sctx.fillText('🔥 最大连击 '+this.maxCombo+'x',sw/2,sy),sy+=18;
  sctx.fillStyle='rgba(255,255,255,0.1)';
  for(let i=0;i<6;i++){
    const img=avatars[BREEDS[i]];
    if(img){sctx.globalAlpha=0.3;sctx.drawImage(img,30+i*55,sy+20,50,50);sctx.globalAlpha=1;}

render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(this.shakeX,this.shakeY);

  const grd=ctx.createLinearGradient(0,0,0,H);
  if(this.stage===0){grd.addColorStop(0,'#0d1f1a');grd.addColorStop(1,'#162b20');}
  else if(this.stage===1){grd.addColorStop(0,'#1f1208');grd.addColorStop(1,'#2a1a12');}
  else{grd.addColorStop(0,'#0e0a2a');grd.addColorStop(1,'#1a1050');}
  ctx.fillStyle=grd;ctx.fillRect(-10,-10,W+20,H+20);

  if(!starCache||starCache.width!==cv.width){
    starCache=document.createElement('canvas');starCache.width=cv.width;starCache.height=cv.height;
    const sc=starCache.getContext('2d');sc.setTransform(dpr,0,0,dpr,0,0);
    sc.fillStyle='#fff';
    stars.forEach(s=>{sc.globalAlpha=0.6;sc.beginPath();sc.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);sc.fill();});
  }
  ctx.globalAlpha=0.5+0.3*Math.sin(this.time*0.5);
  ctx.drawImage(starCache,0,0,W,H);
  ctx.globalAlpha=1;

  this.drawEnvBg(ctx);

  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.scale(this.camZoom,this.camZoom);
  ctx.translate(-W/2,-H/2+this.camY);

  this.drawPlatform(ctx);

  if(this.state==='replay'&&this.replayBuf.length>0){
    const frame=this.replayBuf[Math.min(this.replayIdx,this.replayBuf.length-1)];
    if(frame)frame.cats.forEach(c=>this.drawCat(ctx,c,c.r));
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,W,H);
  }else{
    const catsToRender=this.state==='playing'||this.state==='buff-select'||this.state==='paused';
    if(catsToRender){
      for(const c of this.cats)this.drawCat(ctx,c,c.r);
      this.drawRelHints(ctx);
    }
  }

  if(this.buffCardboard>0){
    const platHW=this.platW/2,platCX=W/2;
    ctx.fillStyle='rgba(180,140,80,0.6)';
    ctx.fillRect(platCX-platHW-8,platY-80,6,80);
    ctx.fillRect(platCX+platHW+2,platY-80,6,80);
  }

  drawParticles(ctx);
  this.drawFloatTexts(ctx);
  ctx.restore();

  // 高度刻度（屏幕坐标，不受相机影响）
  if(this.height>2){
    ctx.save();ctx.globalAlpha=0.5;ctx.font='10px sans-serif';ctx.textAlign='right';
    const mPerPx=CAT_R; // 1 CAT_R = 1m
    const step=5; // 每5m一刻度
    for(let m=0;m<this.height+10;m+=step){
      // 世界坐标 y → 屏幕坐标 y
      const worldY=platY-m*mPerPx;
      const screenY=(worldY+this.camY-H/2)*this.camZoom+H/2;
      if(screenY<10||screenY>H-10)continue;
      ctx.fillStyle='rgba(200,220,255,0.7)';
      ctx.fillRect(W-28,screenY,12,1);
      ctx.fillStyle='#c9b8ff';
      ctx.fillText(m+'m',W-32,screenY+4);
    }
    ctx.restore();
  }

  if(this.goldFlash>0){
    ctx.globalAlpha=this.goldFlash*0.35;
    ctx.fillStyle='#ffd700';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  // 崩塌警报：红色呼吸光效
  if(this.collapseTimer>0){
    const pulse=0.3+0.2*Math.sin(this.time*8);
    const rg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
    rg.addColorStop(0,'rgba(255,0,0,0)');rg.addColorStop(1,`rgba(255,0,0,${pulse})`);
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,80,80,0.9)';ctx.font='bold clamp(16px,4vw,24px) sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`⚠️ 警告：地基失踪！${Math.ceil(this.collapseTimer)}s`,W/2,H*0.12);
  }

  if(this.state==='playing'&&this.dragging){
    const nr=BD[this.nextBreed].r*(this.buffShrink>0?0.7:1)*this.camZoom;
    // 引导虚线（屏幕坐标）
    ctx.save();ctx.setLineDash([4,6]);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(this.dragX,60);ctx.lineTo(this.dragX,H);ctx.stroke();
    ctx.setLineDash([]);
    // 预览猫固定在屏幕顶部（屏幕坐标，不受相机影响）
    this.drawCat(ctx,{x:this.dragX,y:60,angle:0,deform:0,breed:this.nextBreed,expr:'fear',r:nr,squashT:0,squashAmt:0},nr);
    ctx.restore();
  }

  ctx.restore();
}

drawPlatform(ctx){
  const platCX=W/2,platHW=this.platW/2;
  ctx.save();
  ctx.translate(platCX,platY);
  ctx.rotate(this.platTilt);
  const grd=ctx.createLinearGradient(0,-8,0,8);
  if(this.stage===0){grd.addColorStop(0,'#a8e6a3');grd.addColorStop(1,'#6dbf67');}
  else if(this.stage===1){grd.addColorStop(0,'#ffcba4');grd.addColorStop(1,'#e8956d');}
  else{grd.addColorStop(0,'#c9b8ff');grd.addColorStop(1,'#9b85e8');}
  // 外发光
  ctx.shadowColor=this.stage===0?'rgba(168,230,163,0.6)':this.stage===1?'rgba(255,180,120,0.6)':'rgba(180,160,255,0.6)';
  ctx.shadowBlur=12;
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.roundRect(-platHW,-7,this.platW,14,7);ctx.fill();
  ctx.shadowBlur=0;
  // 高光
  const shine=ctx.createLinearGradient(0,-7,0,0);
  shine.addColorStop(0,'rgba(255,255,255,0.35)');shine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=shine;
  ctx.beginPath();ctx.roundRect(-platHW,-7,this.platW,7,7);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(-platHW,-7,this.platW,14,7);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='11px sans-serif';ctx.textAlign='center';
  const labels=['🌿','🪵','🌙'];
  ctx.fillText(labels[this.stage]||'',0,-12);
  ctx.restore();
}

drawEnvBg(ctx){
  const py=this.camY*0.3;
  if(this.stage===0){
    // 草地：动态云朵
    const clouds=[{x:0.15,y:0.18,s:1},{x:0.55,y:0.12,s:0.8},{x:0.8,y:0.22,s:1.2}];
    clouds.forEach((cl,i)=>{
      const cx=W*cl.x+Math.sin(this.time*0.3+i)*W*0.03;
      const cy=H*cl.y+py*0.1;
      const r=W*0.06*cl.s;
      ctx.globalAlpha=0.18;
      ctx.fillStyle='#e8f4ff';
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.arc(cx+r*0.7,cy+r*0.2,r*0.75,0,Math.PI*2);
      ctx.arc(cx-r*0.6,cy+r*0.25,r*0.65,0,Math.PI*2);
      ctx.fill();
    });
    // 草丛
    ctx.globalAlpha=0.12;ctx.fillStyle='#a8e6a3';
    for(let i=0;i<6;i++){
      const bx=W*(0.08+i*0.16),by=H*0.88+py*0.15+Math.sin(i*1.7+this.time*0.4)*4;
      ctx.beginPath();ctx.ellipse(bx,by,10+i*2,18+i*3,-0.2+Math.sin(this.time*0.5+i)*0.15,0,Math.PI*2);ctx.fill();
    }
  }else if(this.stage===1){
    // 树干+飘动云
    ctx.globalAlpha=0.13;ctx.fillStyle='#ffcba4';
    for(let i=0;i<3;i++){
      const bx=W*(0.18+i*0.32),by=H*0.72+py*0.35;
      ctx.fillRect(bx-4,by,8,H-by);
      ctx.beginPath();ctx.arc(bx,by-8,16+i*5,0,Math.PI*2);ctx.fill();
    }
    const wx=Math.sin(this.time*0.6)*W*0.08;
    ctx.fillStyle='rgba(255,240,255,0.12)';
    for(let i=0;i<6;i++){
      const cx=W*0.08+i*W*0.15+wx,cy=H*0.28+py*0.12+i*12;
      ctx.beginPath();ctx.arc(cx,cy,18+i*4,0,Math.PI*2);
      ctx.arc(cx+22,cy+4,14+i*2,0,Math.PI*2);ctx.fill();
    }
  }else{
    // 月亮+星云
    ctx.globalAlpha=0.9;
    const moonX=W*0.84,moonY=H*0.14+py*0.08;
    const mg=ctx.createRadialGradient(moonX,moonY,2,moonX,moonY,22);
    mg.addColorStop(0,'#fffde0');mg.addColorStop(0.6,'#ffd6a5');mg.addColorStop(1,'rgba(255,200,100,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(moonX,moonY,22,0,Math.PI*2);ctx.fill();
    // 星云团
    ctx.globalAlpha=0.1;
    for(let i=0;i<5;i++){
      const nx=W*(0.1+i*0.18),ny=H*0.45+py*0.4+Math.sin(this.time*0.25+i*1.2)*25;
      const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,40+i*12);
      ng.addColorStop(0,'rgba(200,180,255,0.6)');ng.addColorStop(1,'rgba(150,120,255,0)');
      ctx.fillStyle=ng;ctx.beginPath();ctx.ellipse(nx,ny,40+i*12,18+i*5,Math.sin(i)*0.5,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

drawCat(ctx,c,r){
  ctx.save();
  ctx.translate(c.x,c.y);
  ctx.rotate(c.angle);
  const sqAmt=c.squashT>0?c.squashAmt*c.squashT:0;
  // 夸张挤压拉伸：系数放大1.8倍
  const sy=(1-c.deform*0.4)*(1-sqAmt*1.8);
  const sx=(1+c.deform*0.2)*(1+sqAmt*1.1);
  if(c.expr==='tremble'){
    ctx.translate(Math.sin(this.time*40)*2,Math.cos(this.time*35)*1.5);
  }
  ctx.scale(sx,sy);

  // 落地阴影
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(2,r*0.92,r*0.7,r*0.13,0,0,Math.PI*2);ctx.fill();

  const img=avatars[c.breed];
  // shadowBlur 毛绒感
  ctx.shadowColor='rgba(255,200,230,0.6)';
  ctx.shadowBlur=15;
  if(img){
    ctx.save();
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.clip();
    ctx.drawImage(img,-r,-r,r*2,r*2);
    ctx.restore();
  }else{
    ctx.fillStyle=BCOL[c.breed]||'#c9b8ff';
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;

  // 径向渐变立体光影
  const rg=ctx.createRadialGradient(-r*0.3,-r*0.35,r*0.05,-r*0.1,-r*0.1,r*1.1);
  rg.addColorStop(0,'rgba(255,255,255,0.32)');
  rg.addColorStop(0.45,'rgba(255,255,255,0.06)');
  rg.addColorStop(1,'rgba(0,0,0,0.22)');
  ctx.fillStyle=rg;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();

  // 轮廓
  ctx.strokeStyle='rgba(255,200,230,0.25)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();

  // 6根胡须
  ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=0.8;
  const wr=r*0.55,wlen=r*0.7;
  [[-1,1],[-1,0],[-1,-1],[1,1],[1,0],[1,-1]].forEach(([sx2,sy2],i)=>{
    const bx=sx2*wr*0.5,by=sy2*r*0.15;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+sx2*wlen,by+sy2*r*0.12);ctx.stroke();
  });

  this.drawExpression(ctx,c,r);
  ctx.restore();
}

drawRelHints(ctx){
  if(!this.dragging||this.state!=='playing')return;
  const nb=this.nextBreed;
  ctx.font='14px sans-serif';ctx.textAlign='center';
  for(const c of this.cats){
    if(!c.landed)continue;
    const r=this.buffCatnip>0?'friendly':rel(nb,c.breed);
    if(r==='intimate'||r==='friendly'){
      ctx.fillText('❤️',c.x,c.y-c.r-10);
    }else if(r==='hostile'){
      ctx.fillText('💢',c.x,c.y-c.r-10);
    }
  }
}


drop(){
  if(this.dropCD>0||this.cats.length>=MAX_CATS)return;
  // 投放 y 始终在屏幕顶部（世界坐标，考虑相机变换）
  const dropWorldY=(60-H/2)/this.camZoom+H/2-this.camY;
  const c=this.makeCat(this.dragX,dropWorldY,this.nextBreed);
  c.vy=50;
  this.cats.push(c);
  this.dropCount++;this.dropCD=0.6;
  this.nextBreed=BREEDS[Math.floor(Math.random()*6)];
  updateNextCard(this.nextBreed);
  sndDrop();
  if(this.buffTimeSlow>0)this.buffTimeSlow--;
  if(this.buffDblScore>0)this.buffDblScore--;
  if(this.buffCatnip>0)this.buffCatnip--;
  if(this.buffShrink>0)this.buffShrink--;
  if(this.buffCardboard>0)this.buffCardboard--;
  if(this.dropCount%10===0&&this.dropCount>0)setTimeout(()=>{if(this.state==='playing')this.showBuffSelect();},300);
}

(function(){
  function toCanvas(cx,cy){
    const r=cv.getBoundingClientRect();
    return {x:(cx-r.left)/r.width*W, y:(cy-r.top)/r.height*H};
  }
  const onDown=(cx,cy)=>{const p=toCanvas(cx,cy);if(game.state!=='playing')return;if(p.y<H*0.6){game.dragging=true;game.dragX=p.x;}};
  const onMove=(cx)=>{if(game.dragging){const r=cv.getBoundingClientRect();game.dragX=Math.max(5,Math.min(W-5,(cx-r.left)/r.width*W));}};
  const onUp=()=>{if(game.dragging&&game.state==='playing')game.drop();game.dragging=false;};
  cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onDown(t.clientX,t.clientY);},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0].clientX);},{passive:false});
  cv.addEventListener('touchend',e=>{e.preventDefault();onUp();},{passive:false});
  cv.addEventListener('mousedown',e=>{onDown(e.clientX,e.clientY);});
  cv.addEventListener('mousemove',e=>{onMove(e.clientX);});
  cv.addEventListener('mouseup',()=>{onUp();});
})();

game=new Game();
function loop(ts){
  requestAnimationFrame(loop);
  if(!game._lastTs)game._lastTs=ts;
  let dt=Math.min((ts-game._lastTs)/1000,0.04);
  game._lastTs=ts;
  if(game.state==='playing'||game.state==='replay')game.update(dt);
  game.render();
}
requestAnimationFrame(loop);

function updateNextCard(breed){
  const d=BD[breed];
  document.getElementById('ncName').textContent=BNAME[breed];
  document.getElementById('ncTag').textContent=d.roleTag;
  document.getElementById('ncDetail').textContent='✅ '+d.pro+'  ⚠️ '+d.con;
  document.getElementById('ncRel').textContent='❤️ '+d.likes+(d.hates?' 💢 '+d.hates:'');
  document.getElementById('nextCard').style.opacity='1';
}

function showDex(){
  const grid=document.getElementById('dexGrid');grid.innerHTML='';
  const col=game?game.collection:JSON.parse(localStorage.getItem('cat_collection')||'[]');
  const stats=JSON.parse(localStorage.getItem('cat_stats')||'{}');
  BREEDS.forEach(b=>{
    const d=BD[b];const unlocked=col.includes(b);
    const st=stats[b]||{};
    const item=document.createElement('div');
    item.className='dex-item'+(unlocked?'':' locked');
    const img=document.getElementById('avatar-'+b);
    const imgSrc=unlocked&&img?img.src:'';
    const imgHtml=unlocked
      ?`<img src="${imgSrc}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;box-shadow:0 0 10px rgba(255,150,200,.3)">`
      :`<div style="width:44px;height:44px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;font-size:20px">🐱</div>`;
    item.innerHTML=`${imgHtml}<div class="dex-info">
      <div class="dn">${unlocked?BNAME[b]:'???'}</div>
      <div class="dt">${unlocked?d.roleTag:'未收集'}</div>
      ${unlocked?`<div class="ds">🏔️ ${(st.maxH||0).toFixed(1)}m &nbsp; 🏆 ${st.score||0}分</div>`:''}
      ${unlocked?`<div class="ds">❤️${d.likes||'-'} ${d.hates?'💢'+d.hates:''}</div>`:''}
    </div>`;
    grid.appendChild(item);
  });
  document.getElementById('dexPanel').classList.add('show');
}
document.getElementById('btnDexStart').onclick=()=>{showDex();};
document.getElementById('btnDexClose').onclick=()=>{document.getElementById('dexPanel').classList.remove('show');};

const ACHIEVEMENTS=[
  {id:'first_land',name:'初次落地',desc:'第一只猫成功落地',stars:1,icon:'🐾'},
  {id:'perfect_10',name:'完美十连',desc:'累计10次Perfect落地',stars:2,icon:'✨'},
  {id:'height_10',name:'摩天猫塔',desc:'高度达到10m',stars:2,icon:'🏗️'},
  {id:'height_30',name:'触云之塔',desc:'高度达到30m',stars:3,icon:'☁️'},
  {id:'social_3',name:'和谐社区',desc:'5秒内3次友善社交',stars:2,icon:'💕'},
  {id:'combo_5',name:'五连击',desc:'连击达到5次',stars:2,icon:'🔥'},
  {id:'all_breeds',name:'全员集合',desc:'收集全部6种猫咪',stars:3,icon:'📖'},
  {id:'score_500',name:'初露锋芒',desc:'单局得分500',stars:1,icon:'⭐'},
  {id:'score_2000',name:'猫界传说',desc:'单局得分2000',stars:3,icon:'👑'},
  {id:'rescue',name:'基地救场',desc:'危险值达90%后成功续命',stars:2,icon:'🚑'},
];
const achData=(()=>{try{return JSON.parse(localStorage.getItem('cat_ach')||'{}')}catch{return{}}})();
let achStars=parseInt(localStorage.getItem('cat_ach_stars')||'0');
function achLevel(s){return s<5?1:s<15?2:s<30?3:s<50?4:s<75?5:s<100?6:s<130?7:s<165?8:s<200?9:10;}

function unlockAch(id){
  if(achData[id])return;
  const a=ACHIEVEMENTS.find(x=>x.id===id);if(!a)return;
  achData[id]=Date.now();
  localStorage.setItem('cat_ach',JSON.stringify(achData));
  achStars+=a.stars;
  localStorage.setItem('cat_ach_stars',achStars);
  const lv=achLevel(achStars);
  const lvEl=document.getElementById('lvBadge');
  if(lvEl)lvEl.textContent='Lv'+lv;
  showAchPopup(a);
  if(game){for(let i=0;i<a.stars;i++)setTimeout(()=>spawnStarParticle(),i*200);}
}

function spawnStarParticle(){
  if(!game)return;
  const sx=W/2,sy=H/2;
  particles.push({x:sx,y:sy,vx:(Math.random()-0.5)*60,vy:-120-Math.random()*60,
    life:1.2,maxLife:1.2,c:'#ffd700',r:8,type:'star',
    tx:W*0.88,ty:H*0.06});
}

function showAchPopup(a){
  let el=document.getElementById('achPopup');
  if(!el){
    el=document.createElement('div');el.id='achPopup';
    el.style.cssText='position:fixed;top:20%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:300;background:rgba(10,20,50,.95);border:1px solid rgba(100,200,255,.3);border-radius:20px;padding:20px 28px;text-align:center;transition:transform .4s cubic-bezier(0.34,1.56,0.64,1),opacity .3s;pointer-events:none;backdrop-filter:blur(16px)';
    document.body.appendChild(el);
  }
  el.innerHTML=`<div style="font-size:36px">${a.icon}</div><div style="font-size:15px;font-weight:700;color:#e0ffff;margin:6px 0;text-shadow:0 0 8px rgba(100,200,255,.8)">${a.name}</div><div style="font-size:12px;opacity:.7">${a.desc}</div><div style="color:#ffd700;font-size:13px;margin-top:6px">${'⭐'.repeat(a.stars)} +${a.stars}星</div>`;
  el.style.transform='translate(-50%,-50%) scale(1)';el.style.opacity='1';
  setTimeout(()=>{el.style.transform='translate(-50%,-50%) scale(0)';el.style.opacity='0';},2500);
}

function showAchList(){
  let el=document.getElementById('achListPanel');
  if(!el){
    el=document.createElement('div');el.id='achListPanel';
    el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;background:rgba(5,10,40,.96);border:1px solid rgba(100,200,255,.25);border-radius:20px;padding:20px;width:85%;max-width:320px;max-height:70vh;overflow-y:auto;backdrop-filter:blur(20px)';
    document.body.appendChild(el);
    el.addEventListener('click',e=>{if(e.target===el)el.style.display='none';});
  }
  const stars=parseInt(localStorage.getItem('cat_ach_stars')||'0');
  const lv=achLevel(stars);
  let html=`<div style="text-align:center;margin-bottom:12px"><span style="font-size:18px;font-weight:800;color:#e0ffff;text-shadow:0 0 10px rgba(100,200,255,.8)">⭐ Lv${lv} · ${stars}星</span></div>`;
  ACHIEVEMENTS.forEach(a=>{
    const done=!!achData[a.id];
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;margin-bottom:6px;background:${done?'rgba(100,200,255,.08)':'rgba(255,255,255,.03)'}">
      <span style="font-size:24px;${done?'':'filter:grayscale(1);opacity:.4'}">${a.icon}</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;color:${done?'#e0ffff':'#888'}">${a.name}</div>
      <div style="font-size:11px;opacity:.6">${a.desc}</div></div>
      <span style="color:#ffd700;font-size:11px">${done?'⭐'.repeat(a.stars):'🔒'}</span>
    </div>`;
  });
  html+=`<div style="text-align:center;margin-top:10px"><button onclick="document.getElementById('achListPanel').style.display='none'" style="padding:8px 24px;border:none;border-radius:12px;background:rgba(100,200,255,.2);color:#e0ffff;cursor:pointer;font-size:13px">关闭</button></div>`;
  el.innerHTML=html;el.style.display='block';
}

// 在 drawParticles 中支持 star 类型（飞行轨迹）
const _origUpdP=updParticles;
updParticles=function(dt){
  _origUpdP(dt);
  // star 粒子：飞向目标点
  particles.forEach(p=>{
    if(p.type==='star'&&p.tx!==undefined){
      p.vx+=(p.tx-p.x)*dt*3;p.vy+=(p.ty-p.y)*dt*3;
    }
  });
};

// 成就检测钩子（在 update 中调用）
function checkAchievements(g){
  if(g.cats.some(c=>c.landed))unlockAch('first_land');
  if(g.score>=500)unlockAch('score_500');
  if(g.score>=2000)unlockAch('score_2000');
  if(g.height>=10)unlockAch('height_10');
  if(g.height>=30)unlockAch('height_30');
  if(g.combo>=5)unlockAch('combo_5');
  if(g.collection&&g.collection.length>=6)unlockAch('all_breeds');
  if(g.danger>=90&&g.buffNineLives)unlockAch('rescue');
}

// 在 drawParticles 中渲染 star 类型
const _origDrawP=drawParticles;
drawParticles=function(ctx){
  _origDrawP(ctx);
};
// 覆盖 star 渲染（在 drawParticles 内部已有 circle 分支，star 走 circle 分支即可，r=8 足够显眼）

// ===== START SCREEN INIT =====
(function initStartScreen(){
  // 海报背景
  const poster=document.getElementById('startPoster');
  const img=new Image();
  img.onload=()=>{
    poster.style.backgroundImage=`url(${img.src})`;
    document.getElementById('bg-blur').style.backgroundImage=`url(${img.src})`;
  };
  img.src='cover.png';

  // 最高分 + 等级初始化
  const hi=parseInt(localStorage.getItem('cat_hi_score'))||0;
  const hiEl=document.getElementById('startHi');
  hiEl.textContent='最高分: '+(hi||0);
  const stars=parseInt(localStorage.getItem('cat_ach_stars')||'0');
  const lv=achLevel(stars);
  const lvEl=document.getElementById('lvBadge');
  if(lvEl)lvEl.textContent='Lv'+lv;
  const startLv=document.getElementById('startLv');
  if(startLv){
    startLv.textContent='⭐ Lv'+lv;
    startLv.onclick=()=>showAchList();
  }

  // 星星闪烁 canvas
  const sc=document.getElementById('starCanvas');
  const sctx=sc.getContext('2d');
  const starList=Array.from({length:60},()=>({
    x:Math.random(),y:Math.random(),r:0.5+Math.random()*1.5,p:Math.random()*Math.PI*2
  }));
  let raf;
  function drawStars(t){
    sc.width=sc.offsetWidth;sc.height=sc.offsetHeight;
    sctx.clearRect(0,0,sc.width,sc.height);
    starList.forEach(s=>{
      const a=0.3+0.7*Math.abs(Math.sin(t*0.001+s.p));
      sctx.globalAlpha=a;sctx.fillStyle='#fff';
      sctx.beginPath();sctx.arc(s.x*sc.width,s.y*sc.height,s.r,0,Math.PI*2);sctx.fill();
    });
    sctx.globalAlpha=1;
    raf=requestAnimationFrame(drawStars);
  }
  raf=requestAnimationFrame(drawStars);

  // 点击开始后停止星星动画
  document.getElementById('btnStart').addEventListener('click',()=>{
    cancelAnimationFrame(raf);
  },{once:true});
})();

}catch(e){document.getElementById('errMsg').style.display='block';console.error(e);}
</script>
